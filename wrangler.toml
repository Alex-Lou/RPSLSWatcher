# RPSLSWatcher — config Cloudflare. Le SITE se déploie via Pages (Git-connecté à
# la branche `main`). Les Pages Functions de functions/ se déploient AVEC.
name = "rpsls-watcher"
compatibility_date = "2024-09-23"
pages_build_output_dir = "dist"

# ⚠️ Le binding D1 N'EST PAS déclaré ici exprès : si on met un database_id dans ce
# fichier, Cloudflare le valide au déploiement (un placeholder → « Invalid database
# UUID », échec de publication de la Function). On le configure donc dans le
# DASHBOARD : Pages → Settings → Functions → D1 database bindings → variable `DB`
# → database `rpsls-watcher`. Cloudflare injecte alors `env.DB` au runtime.
#
# Le secret d'ingest pareil : Pages → Settings → Environment variables → `INGEST_KEY`.
#
# DEV LOCAL (optionnel) : `wrangler pages dev dist --d1 DB=<id-local>` (crée une D1
# locale), et `.dev.vars` pour INGEST_KEY. Rien de tout ça n'est requis pour la prod.
